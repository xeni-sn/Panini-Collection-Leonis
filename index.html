<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Panini">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<title>Panini Checkliste</title>
<style>
:root{--bg:#f4f7fb;--card:#fff;--text:#101828;--muted:#667085;--line:#e5e7eb;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--shadow:0 8px 24px rgba(15,23,42,.08);}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text);padding:env(safe-area-inset-top) 12px 96px}
.app{max-width:760px;margin:0 auto}
.hero{margin:12px 0;padding:20px;border-radius:24px;background:linear-gradient(135deg,#0f172a,#1d4ed8);color:white;box-shadow:var(--shadow)}
h1{margin:0 0 6px;font-size:27px} .hero p{margin:0;color:rgba(255,255,255,.82);font-size:14px}
.progress-bg{margin-top:16px;height:13px;background:rgba(255,255,255,.22);border-radius:999px;overflow:hidden} .progress-bar{height:100%;width:0%;background:#22c55e;transition:.25s}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0} .stat{background:white;border:1px solid var(--line);border-radius:18px;padding:14px 12px;box-shadow:var(--shadow)} .n{font-size:24px;font-weight:900;line-height:1} .t{margin-top:5px;color:var(--muted);font-size:12px}
.tabs{position:sticky;top:env(safe-area-inset-top);z-index:20;background:rgba(244,247,251,.92);backdrop-filter:blur(12px);padding:8px 0;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tab{border:0;border-radius:999px;padding:12px;font-size:15px;font-weight:900;background:#e5e7eb;color:#334155} .tab.active{background:var(--blue);color:white}
.toolbar{display:grid;grid-template-columns:1fr auto;gap:8px;margin:10px 0} input,select{width:100%;border:1px solid var(--line);border-radius:14px;padding:13px 14px;font-size:16px;background:white;color:var(--text);outline:none} select{width:132px}
.list{display:grid;gap:10px} .card,.dup-card,.panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:var(--shadow)} .card{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:12px} .card.done{background:#ecfdf3;border-color:#bbf7d0}
.check{width:32px;height:32px;accent-color:var(--green)} .team{font-size:20px;font-weight:900} .num{margin-top:2px;color:var(--muted);font-size:14px}
.badge{font-size:12px;font-weight:900;padding:6px 10px;border-radius:999px;background:#eef2ff;color:#1e40af;white-space:nowrap} .done .badge{background:#dcfce7;color:#166534}
.panel{margin-bottom:10px} .panel-title{font-size:18px;font-weight:900;margin:0 0 10px} .add-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px} .full{grid-column:1/-1}
.btn{border:0;border-radius:14px;padding:13px 14px;font-size:15px;font-weight:900;color:white;background:var(--blue)} .btn.secondary{background:#e5e7eb;color:#111827} .btn.danger{background:var(--red)}
.dup-card{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center} .dup-main{font-size:19px;font-weight:900} .dup-sub{color:var(--muted);font-size:13px;margin-top:3px}
.qty{display:flex;align-items:center;gap:7px} .qty button{width:36px;height:36px;border:0;border-radius:50%;background:#e5e7eb;font-size:21px;font-weight:900} .qty span{min-width:24px;text-align:center;font-size:18px;font-weight:900}
.hidden{display:none!important} .empty{color:var(--muted);text-align:center;padding:24px 10px}
.bottom{position:fixed;left:0;right:0;bottom:0;padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:rgba(244,247,251,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:grid;grid-template-columns:1fr 1fr;gap:8px;z-index:30}
.toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%);background:#111827;color:white;padding:10px 14px;border-radius:999px;font-size:14px;opacity:0;pointer-events:none;transition:.25s;z-index:50} .toast.show{opacity:1}
.small-note{font-size:13px;color:var(--muted);line-height:1.35;margin:8px 2px 14px}
@media print{.tabs,.toolbar,.panel,.bottom,.toast,.small-note{display:none}body{background:white;padding:0}.hero,.stat,.card,.dup-card{box-shadow:none}}
</style>
</head>
<body>
<main class="app">
<section class="hero"><h1>Panini Checkliste</h1><p>Fehlende abhaken, doppelte erfassen und Liste teilen.</p><div class="progress-bg"><div id="progressBar" class="progress-bar"></div></div></section>
<section class="stats"><div class="stat"><div class="n" id="missingTotal">0</div><div class="t">Noch offen</div></div><div class="stat"><div class="n" id="doneTotal">0</div><div class="t">Erledigt</div></div><div class="stat"><div class="n" id="duplicateTotal">0</div><div class="t">Doppelte</div></div></section>
<section class="tabs"><button class="tab active" id="tabMissing" onclick="switchTab('missing')">Fehlende</button><button class="tab" id="tabDuplicates" onclick="switchTab('duplicates')">Doppelte</button></section>
<section id="missingView"><div class="toolbar"><input type="search" id="missingSearch" placeholder="Suchen: SUI, BRA, 19..." oninput="renderMissing()"><select id="missingFilter" onchange="renderMissing()"><option value="all">Alle</option><option value="open">Offen</option><option value="done">Erledigt</option></select></div><div id="missingList" class="list"></div></section>
<section id="duplicatesView" class="hidden"><div class="panel"><h2 class="panel-title">Doppelten Sticker hinzufügen</h2><div class="add-grid"><input id="dupTeam" placeholder="Land/Serie, z.B. SUI" autocapitalize="characters"><input id="dupNum" placeholder="Nr., z.B. 12" inputmode="numeric"><input class="full" id="dupNote" placeholder="Notiz optional, z.B. Glitzer"><button class="btn full" onclick="addDuplicate()">Hinzufügen</button></div></div><div class="toolbar"><input type="search" id="dupSearch" placeholder="Doppelte suchen..." oninput="renderDuplicates()"><select id="dupSort" onchange="renderDuplicates()"><option value="team">Team</option><option value="qty">Menge</option></select></div><div id="duplicateList" class="list"></div></section>
<p class="small-note">Hinweis: Die Daten werden auf diesem iPhone im Browser gespeichert. Am besten über Safari öffnen und dann zum Home-Bildschirm hinzufügen.</p>
</main>
<div class="bottom"><button class="btn secondary" onclick="shareList()">Liste teilen</button><button class="btn secondary" onclick="window.print()">Drucken</button></div><div id="toast" class="toast">Gespeichert</div>
<script>
const missingItems = [{"team": "MEX", "num": "alle", "label": "Komplett / alle fehlen"}, {"team": "RSA", "num": "alle", "label": "Komplett / alle fehlen"}, {"team": "KOR", "num": "15", "label": "Nr. 15"}, {"team": "CZE", "num": "19", "label": "Nr. 19"}, {"team": "CAN", "num": "7", "label": "Nr. 7"}, {"team": "BIH", "num": "alle", "label": "Komplett / alle fehlen"}, {"team": "QAT", "num": "alle", "label": "Komplett / alle fehlen"}, {"team": "SUI", "num": "alle", "label": "Komplett / alle fehlen"}, {"team": "BRA", "num": "11", "label": "Nr. 11"}, {"team": "BRA", "num": "20", "label": "Nr. 20"}, {"team": "MAR", "num": "11", "label": "Nr. 11"}, {"team": "HAI", "num": "alle", "label": "Komplett / alle fehlen"}, {"team": "SCO", "num": "alle", "label": "Komplett / alle fehlen"}, {"team": "USA", "num": "alle", "label": "Komplett / alle fehlen"}, {"team": "PAR", "num": "8", "label": "Nr. 8"}, {"team": "PAR", "num": "13", "label": "Nr. 13"}, {"team": "AUS", "num": "5", "label": "Nr. 5"}, {"team": "TUR", "num": "alle", "label": "Komplett / alle fehlen"}, {"team": "GER", "num": "19", "label": "Nr. 19"}, {"team": "CUW", "num": "12", "label": "Nr. 12"}, {"team": "CUW", "num": "19", "label": "Nr. 19"}, {"team": "CIV", "num": "alle", "label": "Komplett / alle fehlen"}, {"team": "ECU", "num": "4", "label": "Nr. 4"}, {"team": "ECU", "num": "9", "label": "Nr. 9"}, {"team": "NED", "num": "9", "label": "Nr. 9"}, {"team": "NED", "num": "14", "label": "Nr. 14"}, {"team": "JPN", "num": "6", "label": "Nr. 6"}, {"team": "JPN", "num": "12", "label": "Nr. 12"}, {"team": "SWE", "num": "3", "label": "Nr. 3"}, {"team": "SWE", "num": "18", "label": "Nr. 18"}, {"team": "TUN", "num": "alle", "label": "Komplett / alle fehlen"}, {"team": "BEL", "num": "alle", "label": "Komplett / alle fehlen"}, {"team": "EGY", "num": "6", "label": "Nr. 6"}, {"team": "EGY", "num": "12", "label": "Nr. 12"}, {"team": "EGY", "num": "17", "label": "Nr. 17"}, {"team": "IRN", "num": "alle", "label": "Komplett / alle fehlen"}, {"team": "NZL", "num": "6", "label": "Nr. 6"}, {"team": "NZL", "num": "15", "label": "Nr. 15"}, {"team": "ESP", "num": "2", "label": "Nr. 2"}, {"team": "ESP", "num": "6", "label": "Nr. 6"}, {"team": "CPV", "num": "alle", "label": "Komplett / alle fehlen"}, {"team": "KSA", "num": "16", "label": "Nr. 16"}, {"team": "URU", "num": "alle", "label": "Komplett / alle fehlen"}, {"team": "FRA", "num": "alle", "label": "Komplett / alle fehlen"}, {"team": "SEN", "num": "alle", "label": "Komplett / alle fehlen"}, {"team": "IRQ", "num": "10", "label": "Nr. 10"}, {"team": "NOR", "num": "12", "label": "Nr. 12"}, {"team": "NOR", "num": "16", "label": "Nr. 16"}, {"team": "NOR", "num": "18", "label": "Nr. 18"}, {"team": "ARG", "num": "6", "label": "Nr. 6"}, {"team": "ALG", "num": "13", "label": "Nr. 13"}, {"team": "AUT", "num": "3", "label": "Nr. 3"}, {"team": "AUT", "num": "5", "label": "Nr. 5"}, {"team": "JOR", "num": "6", "label": "Nr. 6"}, {"team": "JOR", "num": "15", "label": "Nr. 15"}, {"team": "JOR", "num": "20", "label": "Nr. 20"}, {"team": "POR", "num": "alle", "label": "Komplett / alle fehlen"}, {"team": "COD", "num": "alle", "label": "Komplett / alle fehlen"}, {"team": "UZB", "num": "8", "label": "Nr. 8"}, {"team": "COL", "num": "2", "label": "Nr. 2"}, {"team": "COL", "num": "5", "label": "Nr. 5"}, {"team": "COL", "num": "10", "label": "Nr. 10"}, {"team": "COL", "num": "19", "label": "Nr. 19"}, {"team": "COL", "num": "20", "label": "Nr. 20"}, {"team": "ENG", "num": "15", "label": "Nr. 15"}, {"team": "ENG", "num": "18", "label": "Nr. 18"}, {"team": "CRO", "num": "19", "label": "Nr. 19"}, {"team": "GHA", "num": "10", "label": "Nr. 10"}, {"team": "PAN", "num": "3", "label": "Nr. 3"}, {"team": "FWC", "num": "17", "label": "Nr. 17"}, {"team": "CC", "num": "3", "label": "Nr. 3"}, {"team": "CC", "num": "4", "label": "Nr. 4"}, {"team": "CC", "num": "7", "label": "Nr. 7"}, {"team": "CC", "num": "9", "label": "Nr. 9"}, {"team": "CC", "num": "10", "label": "Nr. 10"}];
const STORAGE_DONE='panini_done_pwa_v1', STORAGE_DUP='panini_duplicates_pwa_v1';
function keyOf(i){return i.team+'-'+i.num} function loadDone(){return JSON.parse(localStorage.getItem(STORAGE_DONE)||'{}')} function saveDone(x){localStorage.setItem(STORAGE_DONE,JSON.stringify(x))} function loadDuplicates(){return JSON.parse(localStorage.getItem(STORAGE_DUP)||'[]')} function saveDuplicates(x){localStorage.setItem(STORAGE_DUP,JSON.stringify(x))}
function toast(s){let t=document.getElementById('toast');t.textContent=s;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1200)}
function switchTab(tab){document.getElementById('missingView').classList.toggle('hidden',tab!=='missing');document.getElementById('duplicatesView').classList.toggle('hidden',tab!=='duplicates');document.getElementById('tabMissing').classList.toggle('active',tab==='missing');document.getElementById('tabDuplicates').classList.toggle('active',tab==='duplicates')}
function toggleDone(k){let d=loadDone();d[k]=!d[k];saveDone(d);renderMissing();updateStats();toast(d[k]?'Abgehakt':'Wieder offen')}
function renderMissing(){let list=document.getElementById('missingList'),d=loadDone(),s=document.getElementById('missingSearch').value.toLowerCase().trim(),f=document.getElementById('missingFilter').value;let arr=missingItems.filter(i=>{let done=!!d[keyOf(i)],hay=(i.team+' '+i.num+' '+i.label).toLowerCase();return (!s||hay.includes(s))&&(f==='all'||(f==='open'&&!done)||(f==='done'&&done))});list.innerHTML=arr.length?arr.map(i=>{let k=keyOf(i),done=!!d[k];return `<div class="card ${done?'done':''}"><input class="check" type="checkbox" ${done?'checked':''} onchange="toggleDone('${k}')"><div><div class="team">${i.team}</div><div class="num">${i.label}</div></div><div class="badge">${done?'erledigt':'offen'}</div></div>`}).join(''):'<div class="empty">Nichts gefunden.</div>'}
function addDuplicate(){let team=document.getElementById('dupTeam').value.trim().toUpperCase(),num=document.getElementById('dupNum').value.trim(),note=document.getElementById('dupNote').value.trim();if(!team||!num){toast('Team und Nummer eingeben');return}let a=loadDuplicates(),e=a.find(x=>x.team===team&&x.num===num&&(x.note||'')===note);if(e)e.qty+=1;else a.push({team,num,note,qty:1});saveDuplicates(a);document.getElementById('dupTeam').value='';document.getElementById('dupNum').value='';document.getElementById('dupNote').value='';renderDuplicates();updateStats();toast('Hinzugefügt')}
function changeQty(i,delta){let a=loadDuplicates();a[i].qty+=delta;if(a[i].qty<=0)a.splice(i,1);saveDuplicates(a);renderDuplicates();updateStats();toast('Aktualisiert')}
function renderDuplicates(){let list=document.getElementById('duplicateList'),s=document.getElementById('dupSearch').value.toLowerCase().trim(),sort=document.getElementById('dupSort').value;let a=loadDuplicates().map((x,i)=>({...x,originalIndex:i})).filter(x=>!s||(x.team+' '+x.num+' '+(x.note||'')).toLowerCase().includes(s));a.sort(sort==='qty'?(x,y)=>y.qty-x.qty||x.team.localeCompare(y.team):(x,y)=>x.team.localeCompare(y.team)||Number(x.num)-Number(y.num));list.innerHTML=a.length?a.map(x=>`<div class="dup-card"><div><div class="dup-main">${x.team} · Nr. ${x.num}</div><div class="dup-sub">${x.note?x.note+' · ':''}Menge: ${x.qty}</div></div><div class="qty"><button onclick="changeQty(${x.originalIndex},-1)">−</button><span>${x.qty}</span><button onclick="changeQty(${x.originalIndex},1)">+</button></div></div>`).join(''):'<div class="empty">Noch keine doppelten Sticker erfasst.</div>'}
function updateStats(){let d=loadDone(),dups=loadDuplicates(),total=missingItems.length,done=missingItems.filter(x=>d[keyOf(x)]).length,dup=dups.reduce((s,x)=>s+Number(x.qty||0),0);document.getElementById('missingTotal').textContent=total-done;document.getElementById('doneTotal').textContent=done;document.getElementById('duplicateTotal').textContent=dup;document.getElementById('progressBar').style.width=total?(done/total*100)+'%':'0%'}
function buildText(){let d=loadDone(),open=missingItems.filter(x=>!d[keyOf(x)]),dups=loadDuplicates();return 'Panini Liste\n\nNoch fehlend:\n'+(open.map(x=>x.team+' '+(x.num==='alle'?'alle':x.num)).join('\n')||'Alles erledigt 🎉')+'\n\nDoppelte:\n'+(dups.length?dups.map(x=>x.team+' '+x.num+' x'+x.qty+(x.note?' ('+x.note+')':'')).join('\n'):'Keine erfasst')}
async function shareList(){let text=buildText();if(navigator.share){try{await navigator.share({title:'Panini Liste',text});return}catch(e){}}try{await navigator.clipboard.writeText(text);toast('Liste kopiert')}catch(e){alert(text)}}
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}
renderMissing();renderDuplicates();updateStats();
</script>
</body>
</html>
